<!DOCTYPE html>
<html>
<head>
  <title>Meshy 3D Generator Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 32px;
      background: #f9fafb;
      color: #111827;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      margin-bottom: 16px;
      font-family: monospace;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #1d4ed8;
    }
    #status {
      margin-top: 16px;
      font-size: 14px;
      color: #059669;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <h1>Settings</h1>
  <p>To use the Meshy 3D Generator, you need to provide your own Meshy API key. This key is stored securely in your browser and is only sent directly to Meshy's servers.</p>
  
  <div class="card">
    <label for="apiKey">Meshy API Key</label>
    <input type="password" id="apiKey" placeholder="msy_..." spellcheck="false" />
    <button id="saveBtn">Save Settings</button>
    <div id="status">Settings saved successfully!</div>
  </div>

  <script src="options.js"></script>
</body>
</html>
